<svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
  <!-- Shield background -->
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield shape -->
  <path d="M 50 20 L 150 20 L 150 100 Q 100 180 100 200 Q 100 180 50 100 L 50 20" 
        fill="url(#goldGradient)" stroke="#B8860B" stroke-width="2"/>
  
  <!-- Shield border -->
  <path d="M 50 20 L 150 20 L 150 100 Q 100 180 100 200 Q 100 180 50 100 L 50 20" 
        fill="none" stroke="#8B7500" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Soccer ball -->
  <circle cx="100" cy="75" r="35" fill="#000" stroke="#FFD700" stroke-width="1"/>
  
  <!-- Pentagon patterns on ball -->
  <g fill="#FFD700" stroke="#000" stroke-width="0.5">
    <!-- Center pentagons -->
    <polygon points="100,50 115,58 110,75 90,75 85,58"/>
    <polygon points="85,80 75,75 80,92 105,95 110,82"/>
    <polygon points="120,80 115,95 140,92 145,75 135,80"/>
  </g>
  
  <!-- Hexagon patterns (white sections) -->
  <g fill="none" stroke="#FFD700" stroke-width="1">
    <circle cx="100" cy="75" r="30"/>
  </g>
  
  <!-- Text background -->
  <rect x="30" y="155" width="140" height="35" fill="#1a1a1a" rx="5"/>
  
  <!-- Text -->
  <text x="100" y="175" font-family="Arial, sans-serif" font-size="14" font-weight="bold" 
        fill="#FFD700" text-anchor="middle">BAIÃO</text>
  <text x="100" y="185" font-family="Arial, sans-serif" font-size="11" 
        fill="#FFD700" text-anchor="middle">SOCIETY</text>
</svg>